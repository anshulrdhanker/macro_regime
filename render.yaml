services:
  - type: web
    name: equity-implied-macro-barometer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --workers 1 --threads 4 --timeout 180
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.13"
      - key: DATA_FRESHNESS_MINUTES
        value: "60"
      - key: FRED_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
